name: CI

# Runs on every push and pull request, and is also callable from cd.yml so
# main-branch deploys always go through the exact same gate rather than a
# parallel, potentially-drifted copy of the same checks.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_call:

env:
  NODE_VERSION: "22"

jobs:
  quality:
    name: Typecheck, lint, format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies (verifies package-lock.json is in sync)
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check

  unit-tests:
    name: Unit and component tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Run Vitest with coverage
        run: npm run test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          retention-days: 14

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: npm audit (fail on high/critical advisories)
        run: npm audit --omit=dev --audit-level=high

  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build and validate SEO artifacts
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build (runs generate:seo, typecheck, vite build)
        run: npm run build
      - name: Validate tool metadata (SEO uniqueness, required fields)
        run: npm run validate:metadata
      - name: Validate sitemap.xml and robots.txt
        run: npm run validate:sitemap
      - name: Validate internal documentation links
        run: npm run validate:links
      - name: Validate built HTML shell
        run: npm run validate:html
      - name: Check bundle size budgets
        run: npm run size
      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 14

  e2e-tests:
    name: End-to-end tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Run Playwright (navigation, search, routing, metadata,
          accessibility, console errors, tool functionality)
        run: npm run test:e2e
        env:
          CI: true
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14

  lighthouse:
    name: Lighthouse CI (performance, accessibility, best practices, SEO)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Start preview server
        run: npx vite preview --port 4173 &
      - name: Wait for preview server
        run: npx wait-on http://localhost:4173 --timeout 60000
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: "./lighthouserc.json"
          uploadArtifacts: true
          temporaryPublicStorage: true

  # Single required check to point branch protection at -- succeeds only if
  # every job above succeeded, so main is protected without having to keep
  # a branch-protection rule's job list in sync with this file by hand.
  ci-success:
    name: CI success
    runs-on: ubuntu-latest
    needs:
      [quality, unit-tests, dependency-audit, secret-scan, build, e2e-tests, lighthouse]
    if: always()
    steps:
      - name: Fail if any dependency failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1

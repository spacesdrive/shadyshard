name: CD

# Deploys to Cloudflare Pages, but only after the full CI workflow has
# passed on main. `ci` below runs ci.yml as a reusable workflow (not a
# separate copy of its checks) via `uses:`, and `deploy` declares
# `needs: [ci]` -- if any CI job fails, this whole workflow fails and the
# deploy step never runs. There is no separate path to production.
on:
  push:
    branches: [main]

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [ci]
    environment:
      name: production
      url: ${{ steps.deploy.outputs.deployment-url }}
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=shadyshard --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
